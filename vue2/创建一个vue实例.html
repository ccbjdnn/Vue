<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>01</title>
  <style>
    .box2 {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 15px;
    }
  </style>
</head>

<body>
  <!-- if-js删除 -->
  <!-- show-css隐藏 -->
  <div v-if="unflag" class="box">
    {{ message }} <!-- 对比 -->
  </div>
  <div v-show="flag" id="box" v-html="ciallo">
    <!-- 使用双大括号语法绑定数据 -->
    <h1>{{ message }}</h1>
  </div>

  <div class="box2">
    <button @click="Switch">ciallo</button>
    <button v-on:click="count--">-</button>
    <h4 v-show="flag">{{ count }}</h4>
    <button @click="count++">+</button>
  </div>










  <script src="../资料/vue.js"></script>
  <script>
    // 创建一个Vue实例
    const app = new Vue({
      el: '#box', // 绑定到页面上的元素
      data: {
        message: 'Ciallo, Vue!', // 定义一个数据属性
        ciallo: `<a href="https://www.ciallo.com" target="_blank">Ciallo, Vue!</a>`, // 定义一个数据属性，包含HTML字符串
        flag: true,
        unflag: false
      }
    });
    const app1 = new Vue({
      el: '.box', // 绑定到页面上的元素
      data: {
        flag: true,
        unflag: false
      }
    });
    const app2 = new Vue({
      el: '.box2', // 绑定到页面上的元素
      data: {
        count: 0,
        flag: true
      },
      methods: {
        Switch() {
          this.flag = !this.flag
        }
      }
    });
  </script>
</body>

</html>
